<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#16a34a">
  <title>EKO-ELSA - 인천서부지사</title>
  
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes bounce-slow {
      0%, 100% { transform: translateY(-5%); }
      50% { transform: translateY(0); }
    }
    .animate-bounce-slow { animation: bounce-slow 2s infinite; }
    
    /* 캐릭터 전용 추가 애니메이션 이펙트 */
    @keyframes breath { 
      0%, 100% { transform: scale(1); } 
      50% { transform: scale(1.1); } 
    }
    .animate-breath { animation: breath 2.5s ease-in-out infinite; }
    
    @keyframes sway { 
      0%, 100% { transform: rotate(-8deg); } 
      50% { transform: rotate(8deg); } 
    }
    .animate-sway { animation: sway 3s ease-in-out infinite; transform-origin: bottom center; }
    
    @keyframes float { 
      0%, 100% { transform: translateY(0px); } 
      50% { transform: translateY(-12px); } 
    }
    .animate-float { animation: float 3s ease-in-out infinite; }
    
    @keyframes pulse-ring { 
      0% { transform: scale(0.7); opacity: 0.5; } 
      100% { transform: scale(1.4); opacity: 0; } 
    }
    .animate-pulse-ring { animation: pulse-ring 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
    
    @keyframes spin-slow { 
      100% { transform: rotate(360deg); } 
    }
    .animate-spin-slow { animation: spin-slow 10s linear infinite; }
  </style>
</head>
<body class="h-[100dvh] bg-gray-50 flex justify-center font-sans text-gray-800 overflow-hidden">

  <div class="w-full max-w-md bg-white h-full shadow-2xl relative flex flex-col">
    
    <!-- 헤더 -->
    <header class="bg-white pt-12 pb-4 px-6 shrink-0 z-10 border-b border-gray-100">
      <div class="flex justify-between items-start">
        <div class="pt-1">
          <h1 class="text-2xl font-extrabold text-green-700 tracking-tight flex items-center leading-none">
            <i data-lucide="leaf" class="mr-1.5 w-6 h-6"></i>
            EKO-ELSA
          </h1>
          <p class="text-xs text-gray-500 mt-1.5 ml-1">인천서부지사</p>
        </div>
        <img src="https://i.ibb.co/TdGttdp/ci.png" alt="한국승강기안전공단 로고" class="h-8 object-contain mt-1.5" referrerpolicy="no-referrer" />
      </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main id="app-content" class="flex-1 overflow-y-auto pb-6"></main>

    <!-- 하단 네비게이션 -->
    <nav class="w-full bg-white border-t border-gray-200 px-6 py-3 flex justify-between pb-8 shrink-0">
      <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center flex-1 transition-colors text-green-600">
        <i data-lucide="home" class="w-6 h-6"></i>
        <span class="text-[10px] mt-1 font-medium">마이홈</span>
      </button>
      <button onclick="switchTab('missions')" id="nav-missions" class="flex flex-col items-center flex-1 transition-colors text-gray-400">
        <i data-lucide="list-todo" class="w-6 h-6"></i>
        <span class="text-[10px] mt-1 font-medium">미션</span>
      </button>
      <button onclick="switchTab('forest')" id="nav-forest" class="flex flex-col items-center flex-1 transition-colors text-gray-400">
        <i data-lucide="users" class="w-6 h-6"></i>
        <span class="text-[10px] mt-1 font-medium">지사 숲/랭킹</span>
      </button>
    </nav>
    
    <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoUpload(event)" />
  </div>

  <!-- 이름 입력 모달 -->
  <div id="onboarding-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden backdrop-blur-sm px-4">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-in">
      <div class="flex justify-center mb-4"><span class="text-5xl">🌱</span></div>
      <h2 class="text-xl font-bold text-center text-gray-800 mb-2">환영합니다!</h2>
      <p class="text-sm text-gray-500 text-center mb-6">EKO-ELSA에서 사용할 이름을 입력해주세요.</p>
      <input type="text" id="username-input" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-green-500" placeholder="이름 입력 (예: 홍길동)" />
      <button onclick="saveUserName()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl">시작하기</button>
    </div>
  </div>

  <!-- 캐릭터 선택 모달 -->
  <div id="character-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden backdrop-blur-sm px-4">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-in">
      <h2 class="text-lg font-bold text-center text-gray-800 mb-1">키울 캐릭터 선택</h2>
      <p class="text-xs text-center text-gray-500 mb-4">지구온난화로 위기에 처한 생태계</p>
      <div class="grid grid-cols-3 gap-3 mb-6">
        <button onclick="selectCharacter('type1')" class="bg-green-50 border border-green-200 p-4 rounded-xl flex flex-col items-center hover:bg-green-100 transition-colors">
          <span class="text-3xl mb-1">🌳</span><span class="text-xs font-bold text-green-800">나무</span>
        </button>
        <button onclick="selectCharacter('type2')" class="bg-blue-50 border border-blue-200 p-4 rounded-xl flex flex-col items-center hover:bg-blue-100 transition-colors">
          <span class="text-3xl mb-1">🐻‍❄️</span><span class="text-xs font-bold text-blue-800">북극곰</span>
        </button>
        <button onclick="selectCharacter('type3')" class="bg-indigo-50 border border-indigo-200 p-4 rounded-xl flex flex-col items-center hover:bg-indigo-100 transition-colors">
          <span class="text-3xl mb-1">🐧</span><span class="text-xs font-bold text-indigo-800">펭귄</span>
        </button>
      </div>
      <button onclick="closeCharacterModal()" class="w-full bg-gray-200 text-gray-700 font-bold py-2 rounded-xl">닫기</button>
    </div>
  </div>

  <!-- 로딩 오버레이 -->
  <div id="sync-loading" class="fixed inset-0 bg-white/80 z-50 items-center justify-center hidden backdrop-blur-sm">
    <div class="flex flex-col items-center bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
      <div class="w-10 h-10 border-4 border-green-200 border-t-green-600 rounded-full animate-spin mb-4"></div>
      <p class="font-bold text-gray-800">건강 데이터 동기화 중...</p>
      <p class="text-xs text-gray-500 mt-1">Samsung / Apple Health 연결 중</p>
    </div>
  </div>

  <!-- 에너지지킴이 서약 모달 (신규 추가) -->
  <div id="pledge-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden backdrop-blur-sm px-4">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-in">
      <h2 class="text-lg font-bold text-center text-green-700 mb-4 flex items-center justify-center">
        <i data-lucide="shield-check" class="mr-2"></i> 에너지지킴이 행동 서약
      </h2>
      <p class="text-xs text-gray-500 text-center mb-5">아래 항목들에 모두 체크하여<br/>에너지지킴이로 활동할 것을 서약해주세요.</p>
      
      <div class="space-y-3 mb-6 text-sm text-gray-700">
        <label class="flex items-start space-x-2 p-3 bg-gray-50 rounded-lg border border-gray-200 cursor-pointer hover:bg-green-50 transition-colors">
          <input type="checkbox" class="pledge-checkbox mt-0.5 text-green-600 w-4 h-4 focus:ring-green-500 rounded" />
          <span class="flex-1 leading-snug">나는 사용하지 않는 전자기기의 플러그를 뽑겠습니다.</span>
        </label>
        <label class="flex items-start space-x-2 p-3 bg-gray-50 rounded-lg border border-gray-200 cursor-pointer hover:bg-green-50 transition-colors">
          <input type="checkbox" class="pledge-checkbox mt-0.5 text-green-600 w-4 h-4 focus:ring-green-500 rounded" />
          <span class="flex-1 leading-snug">나는 점심시간 및 퇴근 시 조명과 PC를 끄겠습니다.</span>
        </label>
        <label class="flex items-start space-x-2 p-3 bg-gray-50 rounded-lg border border-gray-200 cursor-pointer hover:bg-green-50 transition-colors">
          <input type="checkbox" class="pledge-checkbox mt-0.5 text-green-600 w-4 h-4 focus:ring-green-500 rounded" />
          <span class="flex-1 leading-snug">나는 적정 실내온도(여름 26도, 겨울 20도)를 준수하겠습니다.</span>
        </label>
      </div>
      
      <button onclick="submitPledge()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 mb-2 transition-colors shadow-md">서약 완료하기 (+50P)</button>
      <button onclick="closePledgeModal()" class="w-full bg-gray-200 text-gray-700 font-bold py-2 rounded-xl hover:bg-gray-300 transition-colors">닫기</button>
    </div>
  </div>

  <!-- 환경 교육 모달 (이번 주 미션) -->
  <div id="edu-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden backdrop-blur-sm px-4">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-in relative">
      <button onclick="closeEduModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-colors">
        <i data-lucide="x" class="w-6 h-6"></i>
      </button>
      <div id="edu-content" class="mt-2"></div>
      <div class="mt-6">
        <button onclick="closeEduModal()" class="w-full px-4 py-3 bg-green-600 hover:bg-green-700 text-white transition-colors rounded-xl text-sm font-bold shadow-md">확인</button>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(()=>{});
      });
    }

    function getTodayStr() {
      const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    // --- State Initialization ---
    let savedName = localStorage.getItem('eko_userName') || '';
    let savedPoints = parseInt(localStorage.getItem('eko_points')) || 0;
    let savedSteps = parseInt(localStorage.getItem('eko_steps')) || 0;
    let savedCarbon = parseFloat(localStorage.getItem('eko_carbon')) || 0;
    let savedChar = localStorage.getItem('eko_charType') || 'type1';
    let savedPledge = localStorage.getItem('eko_pledgeCompleted') === 'true'; // 서약 완료 여부

    let savedLeaderboard = JSON.parse(localStorage.getItem('eko_leaderboard'));
    let myNameString = savedName ? savedName + ' (나)' : '이름없음 (나)';
    
    if (!savedLeaderboard || !Array.isArray(savedLeaderboard)) {
      savedLeaderboard = [
        { id: 1, name: myNameString, points: savedPoints, steps: savedSteps, carbon: savedCarbon }
      ];
    } else {
      const myIdx = savedLeaderboard.findIndex(u => u.name.includes('(나)'));
      if (myIdx > -1) {
        savedLeaderboard[myIdx].name = myNameString;
        savedLeaderboard[myIdx].points = savedPoints;
        savedLeaderboard[myIdx].steps = savedSteps;
        savedLeaderboard[myIdx].carbon = savedCarbon;
      } else {
        savedLeaderboard.push({ id: 1, name: myNameString, points: savedPoints, steps: savedSteps, carbon: savedCarbon });
      }
      savedLeaderboard.sort((a, b) => b.points - a.points);
    }

    let state = {
      activeTab: 'home',
      points: savedPoints,
      steps: savedSteps,
      carbonSaved: savedCarbon,
      charType: savedChar,
      pledgeCompleted: savedPledge,
      leaderboard: savedLeaderboard,
      pendingMission: null,
      todayMissions: JSON.parse(localStorage.getItem('eko_todayMissions')) || {}
    };

    function saveState() {
      localStorage.setItem('eko_points', state.points);
      localStorage.setItem('eko_steps', state.steps);
      localStorage.setItem('eko_carbon', state.carbonSaved);
      localStorage.setItem('eko_charType', state.charType);
      localStorage.setItem('eko_pledgeCompleted', state.pledgeCompleted);
      localStorage.setItem('eko_todayMissions', JSON.stringify(state.todayMissions));
      localStorage.setItem('eko_leaderboard', JSON.stringify(state.leaderboard));
    }

    // --- Onboarding & Character Select ---
    window.checkOnboarding = function() {
      if (!savedName) {
        document.getElementById('onboarding-modal').classList.remove('hidden');
        document.getElementById('onboarding-modal').classList.add('flex');
      }
    };

    window.saveUserName = function() {
      const nameInput = document.getElementById('username-input').value.trim();
      if (nameInput) {
        localStorage.setItem('eko_userName', nameInput);
        savedName = nameInput;
        
        const myIdx = state.leaderboard.findIndex(u => u.name.includes('(나)'));
        if(myIdx > -1) {
          state.leaderboard[myIdx].name = nameInput + ' (나)';
          saveState();
        }

        document.getElementById('onboarding-modal').classList.remove('flex');
        document.getElementById('onboarding-modal').classList.add('hidden');
        render();
      } else { alert('이름을 입력해주세요.'); }
    };

    window.openCharacterModal = function() {
      document.getElementById('character-modal').classList.remove('hidden');
      document.getElementById('character-modal').classList.add('flex');
    };

    window.closeCharacterModal = function() {
      document.getElementById('character-modal').classList.add('hidden');
    };

    window.selectCharacter = function(type) {
      state.charType = type;
      saveState();
      closeCharacterModal();
      render();
    };

    // --- Energy Guardian Pledge (서약 로직) ---
    window.openPledgeModal = function() {
      if (state.pledgeCompleted) {
        alert("이미 서약을 완료하셨습니다.");
        return;
      }
      // 체크박스 초기화
      document.querySelectorAll('.pledge-checkbox').forEach(cb => cb.checked = false);
      document.getElementById('pledge-modal').classList.remove('hidden');
      document.getElementById('pledge-modal').classList.add('flex');
    };

    window.closePledgeModal = function() {
      document.getElementById('pledge-modal').classList.add('hidden');
      document.getElementById('pledge-modal').classList.remove('flex');
    };

    window.submitPledge = function() {
      const checkboxes = document.querySelectorAll('.pledge-checkbox');
      const allChecked = Array.from(checkboxes).every(cb => cb.checked);
      
      if (!allChecked) {
        alert("모든 행동 서약 항목에 체크해주세요.");
        return;
      }
      
      state.pledgeCompleted = true;
      state.points += 50;
      state.carbonSaved = +(state.carbonSaved + 1.0).toFixed(3);
      updateLeaderboard();
      saveState();
      
      closePledgeModal();
      alert("에너지지킴이 서약이 완료되었습니다!\n50P 획득 및 1.0kg 탄소 저감 효과가 적용되었습니다.");
      render();
    };

    // --- Growth Logic ---
    function getLevelInfo(currentPoints, type) {
      const types = {
        type1: { l1:'🌱', l2:'🌿', l3:'🪴', l4:'🌳' }, // 나무
        type2: { l1:'💧', l2:'❄️', l3:'🧊', l4:'🐻‍❄️' }, // 북극곰 
        type3: { l1:'🥚', l2:'❄️', l3:'🧊', l4:'🐧' }  // 펭귄 
      };
      const emojis = types[type] || types.type1;

      if (currentPoints < 1000) return { level: 1, name: '1단계', emoji: emojis.l1, max: 1000, color: 'text-green-400' };
      if (currentPoints < 2000) return { level: 2, name: '2단계', emoji: emojis.l2, max: 2000, color: 'text-blue-400' };
      if (currentPoints < 3000) return { level: 3, name: '3단계', emoji: emojis.l3, max: 3000, color: 'text-indigo-500' };
      return { level: 4, name: '성장완료', emoji: emojis.l4, max: 3000, color: 'text-gray-800' };
    }

    function getProgressPercent() {
      const levelInfo = getLevelInfo(state.points, state.charType);
      if (levelInfo.level === 4) return 100;
      let base = (levelInfo.level - 1) * 1000;
      return Math.min(100, Math.max(0, ((state.points - base) / 1000) * 100));
    }

    // --- Actions ---
    window.switchTab = function(tab) {
      state.activeTab = tab;
      document.getElementById('nav-home').className = `flex flex-col items-center flex-1 transition-colors ${tab === 'home' ? 'text-green-600' : 'text-gray-400'}`;
      document.getElementById('nav-missions').className = `flex flex-col items-center flex-1 transition-colors ${tab === 'missions' ? 'text-green-600' : 'text-gray-400'}`;
      document.getElementById('nav-forest').className = `flex flex-col items-center flex-1 transition-colors ${tab === 'forest' ? 'text-green-600' : 'text-gray-400'}`;
      render();
    };

    window.handleSyncSteps = function() {
      const syncLoading = document.getElementById('sync-loading');
      syncLoading.classList.remove('hidden'); syncLoading.classList.add('flex');
      setTimeout(() => {
        syncLoading.classList.add('hidden'); syncLoading.classList.remove('flex');
        const addedSteps = Math.floor(Math.random() * 1000) + 500;
        const earnedPoints = Math.floor(addedSteps / 100); 
        const savedCarbon = +(addedSteps * 0.000147).toFixed(3); 
        
        state.steps += addedSteps; state.points += earnedPoints; state.carbonSaved = +(state.carbonSaved + savedCarbon).toFixed(3);
        updateLeaderboard();
        saveState();
        alert(`동기화 성공! 걸음 수 ${addedSteps}보가 추가되었습니다.`);
        render();
      }, 1500);
    };

    function updateLeaderboard() {
      const myIdx = state.leaderboard.findIndex(u => u.name.includes('(나)'));
      if(myIdx > -1) {
         state.leaderboard[myIdx] = { ...state.leaderboard[myIdx], points: state.points, steps: state.steps, carbon: state.carbonSaved };
      }
      state.leaderboard.sort((a,b) => b.points - a.points);
    }

    // --- 포인트 지급 시스템 ---
    window.grantPoints = function() {
      const targetName = prompt('포인트를 지급/선물할 지사원의 이름을 입력하세요.\n(본인에게 지급하려면 본인 이름 입력)');
      if (!targetName) return;

      const pointsStr = prompt(`${targetName}님에게 지급할 포인트를 숫자로 입력하세요. (예: 50)`);
      const addPoints = parseInt(pointsStr);
      if (isNaN(addPoints) || addPoints <= 0) {
        alert('올바른 포인트 숫자를 입력해주세요.');
        return;
      }

      const myName = savedName ? savedName : '이름없음';
      if (targetName === myName || targetName === myName + ' (나)' || targetName === '나') {
         state.points += addPoints;
         updateLeaderboard();
         saveState();
         alert(`본인에게 ${addPoints}P가 지급되었습니다!`);
         render();
         return;
      }

      let user = state.leaderboard.find(u => u.name === targetName);
      if (user) {
         user.points += addPoints;
      } else {
         state.leaderboard.push({ id: Date.now(), name: targetName, points: addPoints, steps: 0, carbon: 0 });
      }

      state.leaderboard.sort((a,b) => b.points - a.points);
      saveState();
      alert(`${targetName}님에게 ${addPoints}P가 지급되었습니다!`);
      render();
    };

    window.requestMission = function(missionId) {
      if (state.todayMissions[missionId] === getTodayStr()) {
        alert('오늘 이미 완료한 미션입니다. 내일 다시 참여해주세요.'); 
        return false;
      }
      return true;
    };

    window.triggerCamera = function(missionId, title, points, carbon) {
      if (!requestMission(missionId)) return;
      state.pendingMission = { missionId, title, points, carbon };
      document.getElementById('camera-input').click();
    };

    // 관리자 승인 로직 제거, 사진 선택 시 즉시 미션 완료 처리
    window.handlePhotoUpload = function(event) {
      const file = event.target.files[0];
      if (file && state.pendingMission) {
        completeMission(state.pendingMission);
        event.target.value = ''; 
        state.pendingMission = null;
      }
    };

    window.handleTextMission = function(missionId, title, points, carbon) {
      if (!requestMission(missionId)) return;
      
      let msg = '활동 내용을 입력해주세요.';
      if (missionId === 'm4') msg = '어떤 페이퍼리스 활동을 하셨나요?\n(예: 태블릿으로 회의 참석, 이면지 사용 등)';
      if (missionId === 'm8') msg = '수거함에 제출한 폐배터리 종류와 수량을 적어주세요.';

      const text = prompt(msg); 
      if(text && text.trim().length > 0) { 
        completeMission({ missionId, title, points, carbon });
      } else if (text !== null) { 
        alert('내용을 입력해야 인증이 완료됩니다.'); 
      }
    };

    function completeMission(missionData) {
      state.todayMissions[missionData.missionId] = getTodayStr();
      state.points += missionData.points;
      state.carbonSaved = +(state.carbonSaved + missionData.carbon).toFixed(3);
      updateLeaderboard();
      saveState();
      alert(`[${missionData.title}] 미션 완료!\n${missionData.points}P 및 탄소저감량 ${missionData.carbon}kg이 적립되었습니다.`);
      render();
    }

    // --- Education Modal Logic ---
    const eduData = [
      {
        week: 1,
        title: "당신의 메일함이 지구를 뜨겁게 한다면? 📧",
        desc: "읽지 않은 스팸 메일 1통을 보관하는 데 약 4g의 탄소가 발생합니다. 전 세계 스팸 메일을 다 지우면 자동차 수백만 대가 멈추는 효과가 있어요!",
        action: "오늘 쌓여있는 광고 메일 10개만 지워보세요. 지구의 온도가 0.1도 내려갑니다.",
        tip: "스트리밍 화질을 한 단계만 낮춰도 탄소 배출을 획기적으로 줄일 수 있어요."
      },
      {
        week: 2,
        title: "햄버거 한 개에 담긴 '보이지 않는 탄소' 🍔",
        desc: "소고기 패티 1장을 만드는 데 드는 물은 성인이 3개월 동안 샤워할 수 있는 양입니다. 소가 내뿜는 메탄가스는 자동차 배기가스보다 치명적이에요.",
        action: "일주일에 딱 한 끼만 '고기 없는 식단'을 실천해 보세요. 나무 15그루를 심는 것과 같습니다.",
        tip: "제철 음식을 먹는 것만으로도 장거리 운송 탄소(푸드 마일리지)를 줄일 수 있어요."
      },
      {
        week: 3,
        title: "새 옷 한 벌이 완성되기까지의 긴 여정 👕",
        desc: "흰 면 티셔츠 한 장을 만드는 데 2,700리터의 물이 쓰입니다. 우리가 한 해 버리는 옷은 수천만 톤이며, 대부분은 썩지 않고 독성 가스를 내뿜습니다.",
        action: "새 옷을 사기 전, 옷장 깊숙이 잠든 옷을 꺼내 입어보세요. 가장 친환경적인 옷은 이미 당신의 옷장에 있습니다.",
        tip: "유행을 타지 않는 옷을 사서 오래 입는 것이 최고의 탄소 저감 기술입니다."
      },
      {
        week: 4,
        title: "밤마다 전기를 훔쳐가는 '전기 흡혈귀' 🧛",
        desc: "꽂아두기만 한 콘센트에서 새어 나가는 대기전력이 가정 에너지 소비의 10%나 됩니다. 쓰지 않는 가전은 잠잘 때만이라도 쉬게 해주세요.",
        action: "지금 바로 사용하지 않는 충전기 코드 하나만 뽑아주세요. 지구를 위한 작은 쉼표가 됩니다.",
        tip: "멀티탭 스위치를 끄는 습관은 매달 커피 한 잔 값의 전기료를 아껴줍니다."
      }
    ];

    let currentEduWeek = 0;

    window.openEduModal = function() {
      // 1~4주차 내용 중 랜덤으로 하나를 선택하여 보여줍니다.
      currentEduWeek = Math.floor(Math.random() * eduData.length);
      renderEduContent();
      document.getElementById('edu-modal').classList.remove('hidden');
    };

    window.closeEduModal = function() {
      document.getElementById('edu-modal').classList.add('hidden');
    };

    function renderEduContent() {
      const data = eduData[currentEduWeek];
      document.getElementById('edu-content').innerHTML = `
        <div class="text-center mb-4">
          <span class="bg-green-100 text-green-800 text-[10px] font-bold px-3 py-1.5 rounded-full">📅 ${data.week}주차 미션</span>
        </div>
        <h3 class="text-lg font-bold text-gray-800 mb-3 text-center leading-snug break-keep">${data.title}</h3>
        <p class="text-sm text-gray-600 mb-5 bg-gray-50 p-3.5 rounded-xl border border-gray-100 leading-relaxed break-keep">${data.desc}</p>
        
        <div class="mb-4">
          <h4 class="text-xs font-bold text-green-700 mb-1.5 flex items-center"><i data-lucide="check-circle" class="w-4 h-4 mr-1"></i> 액션</h4>
          <p class="text-sm text-gray-700 leading-relaxed break-keep">${data.action}</p>
        </div>
        
        <div class="bg-blue-50 p-3.5 rounded-xl border border-blue-100">
          <h4 class="text-xs font-bold text-blue-700 mb-1.5 flex items-center"><i data-lucide="lightbulb" class="w-4 h-4 mr-1"></i> 한 줄 팁</h4>
          <p class="text-xs text-gray-700 leading-relaxed break-keep">${data.tip}</p>
        </div>
      `;
      lucide.createIcons();
    }

    // --- Render Functions ---
    function renderHome() {
      const levelInfo = getLevelInfo(state.points, state.charType);
      const percent = getProgressPercent();

      // 캐릭터 타입별 이펙트 색상 설정
      const typeStyles = {
        type1: { border: 'border-green-200', ring: 'bg-green-400', blob: 'bg-green-100', hover: 'hover:bg-green-50' },
        type2: { border: 'border-blue-200', ring: 'bg-blue-400', blob: 'bg-blue-100', hover: 'hover:bg-blue-50' },
        type3: { border: 'border-indigo-200', ring: 'bg-indigo-400', blob: 'bg-indigo-100', hover: 'hover:bg-indigo-50' }
      };
      const ts = typeStyles[state.charType];

      // 단계별 애니메이션 설정
      let charAnimation = 'animate-breath'; // 1단계: 숨쉬기
      if(levelInfo.level === 2) charAnimation = 'animate-sway'; // 2단계: 살랑살랑
      if(levelInfo.level === 3) charAnimation = 'animate-float'; // 3단계: 둥둥 떠다님
      if(levelInfo.level === 4) charAnimation = 'animate-bounce-slow scale-110'; // 4단계: 바운스 및 커짐

      return `
        <div class="flex flex-col items-center p-6 space-y-6 animate-in">
          <div class="w-full bg-white rounded-2xl p-6 shadow-sm border border-green-100 flex flex-col items-center">
            <div class="flex justify-between w-full items-center mb-2">
              <h2 class="text-lg font-bold text-gray-700">내 캐릭터</h2>
              <span class="text-[10px] text-gray-400">클릭하여 변경</span>
            </div>
            
            <div onclick="openCharacterModal()" class="cursor-pointer relative w-40 h-40 bg-white flex items-center justify-center mb-4 border-2 border-dashed ${ts.border} rounded-full ${ts.hover} transition-all z-0">
              
              <!-- 1. 퍼지는 파동 이펙트 -->
              <div class="absolute inset-0 rounded-full ${ts.ring} animate-pulse-ring z-[-2]"></div>
              
              <!-- 2. 회전하는 유기적인 배경 이펙트 (3단계 이상부터 적용) -->
              ${levelInfo.level >= 3 ? `<div class="absolute inset-0 ${ts.blob} opacity-60 animate-spin-slow z-[-1]" style="border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;"></div>` : ''}

              <!-- 3. 메인 캐릭터 애니메이션 -->
              <span class="text-7xl select-none inline-block ${charAnimation} transition-transform duration-500">${levelInfo.emoji}</span>
              
              ${levelInfo.level === 4 ? `<div class="absolute -top-1 -right-1 bg-yellow-400 text-white text-[10px] font-bold px-2 py-1 rounded-full shadow z-10"><i data-lucide="award" class="mr-1 w-3 h-3 inline"></i>완성!</div>` : ''}
            </div>

            <div class="text-center w-full">
              <div class="flex justify-between items-end mb-1">
                <span class="font-bold text-xl ${levelInfo.color}">Lv.${levelInfo.level} ${levelInfo.name}</span>
                <span class="text-sm text-gray-500">${state.points} / ${levelInfo.level === 4 ? 'MAX' : `${levelInfo.max} P`}</span>
              </div>
              <div class="w-full h-3 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full bg-green-500 transition-all duration-1000 ease-out" style="width: ${percent}%;"></div>
              </div>
            </div>
          </div>

          <div class="w-full grid grid-cols-2 gap-4">
            <div onclick="openEduModal()" class="cursor-pointer bg-white p-4 rounded-2xl shadow-sm border border-yellow-200 flex flex-col items-center justify-center hover:bg-yellow-50 transition-colors">
              <i data-lucide="lightbulb" class="text-yellow-500 mb-2 w-7 h-7"></i>
              <span class="text-xs text-gray-500">탄소 저감 교육</span>
              <span class="text-xl font-bold text-gray-800">이번 주 미션</span>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-100 flex flex-col items-center justify-center">
              <i data-lucide="leaf" class="text-green-500 mb-2 w-7 h-7"></i>
              <span class="text-xs text-gray-500">누적 탄소저감</span>
              <span class="text-xl font-bold text-gray-800">${state.carbonSaved} kg</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderMissions() {
      // 렌더링 헬퍼 함수 (오늘 완료 여부에 따른 버튼 상태 변경)
      const getActionBtn = (id, title, points, carbon, type, btnClass, textClass, customText) => {
        const isDone = state.todayMissions[id] === getTodayStr();
        if (isDone) {
          return `<button disabled class="w-full bg-gray-100 text-gray-400 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center"><i data-lucide="check-circle" class="mr-2 w-4 h-4"></i> 오늘 참여 완료</button>`;
        }
        
        let onClickFn = '';
        let iconName = '';
        let btnText = customText || '';

        if (type === 'text') {
          onClickFn = `handleTextMission('${id}', '${title}', ${points}, ${carbon})`;
          iconName = 'message-square';
          btnText = btnText || '내용 입력 인증';
        } else if (type === 'report') {
          onClickFn = `handleTextMission('${id}', '${title}', ${points}, ${carbon})`;
          iconName = 'megaphone';
          btnText = btnText || '담당자에게 신고';
        } else {
          onClickFn = `triggerCamera('${id}', '${title}', ${points}, ${carbon})`;
          iconName = 'camera';
          btnText = btnText || '사진 인증';
        }
        
        return `<button onclick="${onClickFn}" class="w-full ${btnClass} ${textClass} py-2.5 rounded-xl text-sm font-bold flex justify-center items-center"><i data-lucide="${iconName}" class="mr-2 w-4 h-4"></i> ${btnText}</button>`;
      };

      return `
        <div class="p-6 space-y-4 animate-in">
          <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
            <i data-lucide="list-todo" class="mr-2 text-green-600 w-6 h-6"></i>생활 미션
          </h2>
          
          <!-- 미션 1 (에너지지킴이 서약) -->
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-200">
            <div class="flex justify-between mb-3">
              <div class="flex items-center"><div class="w-10 h-10 bg-rose-50 rounded-full flex items-center justify-center mr-3"><i data-lucide="shield-check" class="text-rose-500 w-5 h-5"></i></div>
              <div><h3 class="font-bold text-gray-800 text-sm">모두의 에너지지킴이 서약 <span class="font-normal text-gray-400 text-[10px]">(1회성)</span></h3><p class="text-[10px] text-gray-500 mt-0.5">저감량: 1.0kg</p></div></div>
              <div class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-bold h-fit">+50P</div>
            </div>
            ${state.pledgeCompleted ? 
              `<button disabled class="w-full bg-gray-100 text-gray-400 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center"><i data-lucide="check-circle" class="mr-2 w-4 h-4"></i> 참여 완료</button>` : 
              `<button onclick="openPledgeModal()" class="w-full bg-rose-50 text-rose-600 py-2.5 rounded-xl text-sm font-bold flex justify-center items-center hover:bg-rose-100 transition-colors"><i data-lucide="check-square" class="mr-2 w-4 h-4"></i> 서약하기</button>`
            }
          </div>

          <!-- 신규 추가 미션 (폐배터리 수거) -->
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-200">
            <div class="flex justify-between mb-3">
              <div class="flex items-center"><div class="w-10 h-10 bg-yellow-50 rounded-full flex items-center justify-center mr-3"><i data-lucide="battery" class="text-yellow-500 w-5 h-5"></i></div>
              <div><h3 class="font-bold text-gray-800 text-sm">폐배터리 수거</h3><p class="text-[10px] text-gray-500 mt-0.5">저감량: 0.1kg</p></div></div>
              <div class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-bold h-fit">+50P</div>
            </div>
            ${getActionBtn('m8', '폐배터리 수거', 50, 0.1, 'report', 'bg-yellow-50', 'text-yellow-700', '담당자에게 신고')}
          </div>

          <!-- 미션 2 (페이퍼리스) -->
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-200">
            <div class="flex justify-between mb-3">
              <div class="flex items-center"><div class="w-10 h-10 bg-purple-50 rounded-full flex items-center justify-center mr-3"><i data-lucide="file-text" class="text-purple-500 w-5 h-5"></i></div>
              <div><h3 class="font-bold text-gray-800 text-sm">페이퍼리스 <span class="font-normal text-gray-400 text-[10px]">(예 : 이면지 사용)</span></h3><p class="text-[10px] text-gray-500 mt-0.5">저감량: 0.029kg</p></div></div>
              <div class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-bold h-fit">+30P</div>
            </div>
            ${getActionBtn('m4', '페이퍼리스', 30, 0.029, 'text', 'bg-purple-50', 'text-purple-600')}
          </div>

          <!-- 미션 3 (계단 이용) -->
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-200">
            <div class="flex justify-between mb-3">
              <div class="flex items-center"><div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center mr-3"><i data-lucide="footprints" class="text-blue-500 w-5 h-5"></i></div>
              <div><h3 class="font-bold text-gray-800 text-sm">사무실 출입 시 계단 이용</h3><p class="text-[10px] text-gray-500 mt-0.5">저감량: 0.032kg</p></div></div>
              <div class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-bold h-fit">+20P</div>
            </div>
            ${getActionBtn('m1', '사무실 출입 시 계단 이용', 20, 0.032, 'camera', 'bg-blue-50', 'text-blue-600')}
          </div>

          <!-- 신규 추가 미션 (퇴근 전 콘센트 미차단 신고) -->
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-200">
            <div class="flex justify-between mb-3">
              <div class="flex items-center"><div class="w-10 h-10 bg-red-50 rounded-full flex items-center justify-center mr-3"><i data-lucide="plug" class="text-red-500 w-5 h-5"></i></div>
              <div><h3 class="font-bold text-gray-800 text-sm">퇴근 전 콘센트 미차단 신고</h3><p class="text-[10px] text-gray-500 mt-0.5">저감량: 0.1kg</p></div></div>
              <div class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-bold h-fit">+20P</div>
            </div>
            ${getActionBtn('m7', '퇴근 전 콘센트 미차단 신고', 20, 0.1, 'camera', 'bg-red-50', 'text-red-600')}
          </div>

          <!-- 미션 4 (대중교통 이용) -->
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-200">
            <div class="flex justify-between mb-3">
              <div class="flex items-center"><div class="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center mr-3"><i data-lucide="bus" class="text-indigo-500 w-5 h-5"></i></div>
              <div><h3 class="font-bold text-gray-800 text-sm">출퇴근 대중교통 이용</h3><p class="text-[10px] text-gray-500 mt-0.5">저감량: 1.0kg</p></div></div>
              <div class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-bold h-fit">+25P</div>
            </div>
            ${getActionBtn('m2', '출퇴근 대중교통 이용', 25, 1.0, 'camera', 'bg-indigo-50', 'text-indigo-600')}
          </div>

          <!-- 미션 5 (다회용컵 이용) -->
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-200">
            <div class="flex justify-between mb-3">
              <div class="flex items-center"><div class="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center mr-3"><i data-lucide="coffee" class="text-orange-500 w-5 h-5"></i></div>
              <div><h3 class="font-bold text-gray-800 text-sm">다회용컵 이용</h3><p class="text-[10px] text-gray-500 mt-0.5">저감량: 0.05kg</p></div></div>
              <div class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-bold h-fit">+15P</div>
            </div>
            ${getActionBtn('m3', '다회용컵 이용', 15, 0.05, 'camera', 'bg-orange-50', 'text-orange-600')}
          </div>

        </div>
      `;
    }

    function renderForest() {
      const equivalentTrees = (state.carbonSaved / 6.6).toFixed(1);

      return `
        <div class="p-6 space-y-6 animate-in">
          <div class="bg-green-50 rounded-2xl p-5 shadow-sm border border-green-200 flex items-center justify-between">
            <div class="pr-2">
              <h2 class="font-extrabold text-green-800 text-base mb-1">실제 나무 심기 효과</h2>
              <p class="text-[10px] text-green-600">국립산림과학원 기준</p>
              <p class="text-xs text-gray-600 mt-1">지사 총 탄소저감: ${state.carbonSaved.toFixed(1)}kg</p>
            </div>
            <div class="flex flex-col items-center">
              <span class="text-3xl mb-1">🌲</span>
              <!-- 모바일 화면 텍스트 깨짐 방지: text-sm 사이즈 변경 및 whitespace-nowrap 적용 -->
              <span class="font-extrabold text-sm text-green-700 bg-white px-2 py-1 rounded-full shadow-sm whitespace-nowrap">
                약 ${equivalentTrees} 그루
              </span>
            </div>
          </div>

          <div>
            <div class="flex justify-between items-end mb-4">
              <h3 class="text-lg font-bold text-gray-800 flex items-center"><i data-lucide="trophy" class="mr-2 text-yellow-500 w-5 h-5"></i>지사원 랭킹</h3>
              <button onclick="grantPoints()" class="text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg border border-indigo-100 font-bold hover:bg-indigo-100 transition-colors flex items-center">
                <i data-lucide="gift" class="w-3 h-3 mr-1"></i>포인트 지급/선물
              </button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              ${state.leaderboard.map((user, idx) => `
                <div class="flex items-center justify-between p-4 ${idx === 0 ? 'bg-green-50 border-b border-gray-100' : 'border-b border-gray-50 last:border-0'}">
                  <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold mr-3 ${idx === 0 ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-500'}">${idx + 1}</div>
                    <div>
                      <div class="font-bold text-gray-800 text-sm">${user.name}</div>
                      <div class="text-[10px] text-gray-500">${user.steps.toLocaleString()}보</div>
                    </div>
                  </div>
                  <div class="text-right">
                    <div class="font-bold text-green-600">${user.points}P</div>
                    <div class="text-lg">${getLevelInfo(user.points, 'type1').emoji}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      const contentDiv = document.getElementById('app-content');
      if (state.activeTab === 'home') contentDiv.innerHTML = renderHome();
      else if (state.activeTab === 'missions') contentDiv.innerHTML = renderMissions();
      else if (state.activeTab === 'forest') contentDiv.innerHTML = renderForest();
      lucide.createIcons();
    }

    checkOnboarding();
    render();
    switchTab('home'); // 초기 탭을 마이홈으로 설정
    lucide.createIcons();
  </script>
</body>
</html>
